# This workflow validates the core structure and buildability of the PETOS knowledge base.
name: PETOS Validation

on:
  # Trigger on push events to the main or master branch
  push:
    branches:
      - main
      - master
    paths:
      - 'automation/**'
      - 'stacks/**'
      - 'mkdocs.yml'
  # Trigger on pull requests targeting the main or master branch
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'automation/**'
      - 'stacks/**'
      - 'mkdocs.yml'

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip # The directory to cache
          key: ${{ runner.os }}-pip-${{ hashFiles('automation/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          if [ -f automation/requirements.txt ]; then
            pip install -r automation/requirements.txt
          fi

      - name: Run Comprehensive Validation & Generate Report
        run: |
          python automation/src/validate.py --report-file build/validation-report.md

      - name: Upload Validation Report
        uses: actions/upload-artifact@v4
        if: always() # Always upload the report, even if previous steps fail
        with:
          name: validation-report
          path: build/validation-report.md

      - name: Build MkDocs site with strict mode
        # This step ensures the site compiles without errors and that all
        # navigation links in mkdocs.yml are valid.
        run: mkdocs build --strict